name: ESP32 Build & Upload to 0x0

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libudev-dev \
            python3-pip \
            python3-venv \
            cmake \
            ninja-build \
            ccache \
            libffi-dev \
            libssl-dev

      - name: Extract build config
        id: cfg
        run: |
          TARGET=$(awk -F'"' '/^\[build\]/{f=1} f && /^target/{print $2; exit}' .cargo/config.toml)
          if [ -z "$TARGET" ]; then
            echo "::error::未找到 [build] 下的 target"
            exit 1
          fi
          echo "TARGET=$TARGET" >> "$GITHUB_OUTPUT"

          CHIP=$(awk -F'"' '/^\[env\]/{f=1} f && /^MCU/{print $2; exit}' .cargo/config.toml)
          if [ -z "$CHIP" ]; then
            CHIP=$(echo "$TARGET" | grep -oP '(esp32|esp32s[23]|esp32c[236]|esp32h2|esp32p4)' | head -n 1)
          fi
          CHIP=$(echo "$CHIP" | tr '_' '-')
          echo "CHIP=$CHIP" >> "$GITHUB_OUTPUT"

          CRATE_NAME=$(grep -oP '^\s*name\s*=\s*"\K[^"]+' Cargo.toml | head -n 1 | tr '-' '_')
          echo "CRATE_NAME=$CRATE_NAME" >> "$GITHUB_OUTPUT"

          echo "🎯 Target: $TARGET | Chip: $CHIP | Binary: $CRATE_NAME"

      # ==================== 修复 linker 配置 ====================
      - name: Fix linker config for build-std
        run: |
          # 1. 删除 cfg(...) 段里的 linker = "ldproxy" (它对 build-std 编译标准库无效)
          sed -i '/^[[:space:]]*linker[[:space:]]*=[[:space:]]*"ldproxy"$/d' .cargo/config.toml
          
          # 2. 在文件末尾追加具体的 target 配置，让标准库编译也能使用 ldproxy
          echo "" >> .cargo/config.toml
          echo "[target.${{ steps.cfg.outputs.TARGET }}]" >> .cargo/config.toml
          echo "linker = \"ldproxy\"" >> .cargo/config.toml

      - name: Install Rust (nightly + rust-src)
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rust-src

      - name: Cache Cargo, build & ESP-IDF tools
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
            .embuild
          key: ${{ runner.os }}-esp-${{ steps.cfg.outputs.TARGET }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-esp-${{ steps.cfg.outputs.TARGET }}-

      - name: Install cargo-binstall
        run: |
          curl -L --proto '=https' --tlsv1.2 -sSf \
            https://raw.githubusercontent.com/cargo-bins/cargo-binstall/main/install-from-binstall-release.sh | bash

      - name: Install espflash
        run: |
          cargo binstall -y espflash || cargo install espflash
          espflash --version

      - name: Install ldproxy
        run: |
          cargo binstall -y ldproxy || cargo install ldproxy
          # 注意：绝对不能直接运行 ldproxy 验证，否则会因为缺少参数而 panic
          which ldproxy

      # ==================== 破解 build-std 死锁 ====================
      - name: Pre-download ESP-IDF tools
        run: |
          # 临时禁用 build-std，让 esp-idf-sys 的 build.rs 能顺利执行并下载工具链
          sed -i 's/^build-std/#build-std/' .cargo/config.toml
          
          # 运行 check (会因为缺 std 失败，但工具链已经下载到 .embuild 了)
          cargo check --target "${{ steps.cfg.outputs.TARGET }}" 2>&1 || true
          
          # 恢复 build-std
          sed -i 's/^#build-std/build-std/' .cargo/config.toml
          
          # 推导 gcc 的名字 (riscv32 -> riscv32-esp-elf-gcc, xtensa -> xtensa-esp32s3-elf-gcc)
          TARGET="${{ steps.cfg.outputs.TARGET }}"
          if [[ "$TARGET" == riscv32* ]]; then
            GCC_NAME="riscv32-esp-elf-gcc"
          else
            GCC_NAME="${TARGET%-espidf}-elf-gcc"
          fi
          
          # 在 .embuild 中找到刚下载的 gcc，并将其目录加入后续步骤的 PATH
          GCC_DIR=$(find .embuild -name "$GCC_NAME" -type f -exec dirname {} \; | head -n 1)
          if [ -z "$GCC_DIR" ]; then
            echo "::error::未能找到 $GCC_NAME，工具链下载可能失败"
            exit 1
          fi
          echo "✅ 找到工具链: $GCC_DIR"
          echo "$GCC_DIR" >> $GITHUB_PATH

      # ==================== 真正的构建 ====================
      - name: Build
        run: cargo build --release

      # ==================== 合并单 bin ====================
      - name: Merge into single flashable binary
        run: |
          ELF="target/${{ steps.cfg.outputs.TARGET }}/release/${{ steps.cfg.outputs.CRATE_NAME }}"
          OUT="merged-${{ steps.cfg.outputs.CHIP }}.bin"
          espflash save-image \
            --chip "${{ steps.cfg.outputs.CHIP }}" \
            --merge \
            "$ELF" \
            "$OUT"
          echo "✅ Created:"
          ls -lh "$OUT"

      # ==================== 上传 ====================
      - name: Upload to 0x0.st
        run: |
          OUT="merged-${{ steps.cfg.outputs.CHIP }}.bin"
          RESP=$(curl -sS -F "file=@${OUT}" https://0x0.st)
          URL=$(echo "$RESP" | grep -oE 'https://0x0\.st/[a-zA-Z0-9]+' | head -n 1)
          if [ -z "$URL" ]; then
            echo "::error::0x0.st upload failed: $RESP"
            exit 1
          fi
          echo ""
          echo "==========================================="
          echo "🎉 Download: $URL"
          echo "==========================================="
          echo ""

      - name: Upload artifact (backup)
        uses: actions/upload-artifact@v4
        with:
          name: esp32-${{ steps.cfg.outputs.CHIP }}-merged-bin
          path: "merged-${{ steps.cfg.outputs.CHIP }}.bin"
          retention-days: 7
