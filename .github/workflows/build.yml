name: ESP32 (std) Build & Upload to 0x0

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract build config (Target, Chip, Crate Name)
        id: cfg
        run: |
          # 1) 从 .cargo/config.toml 提取 target（只取第一个 [target.xxx]，且不包含 cfg 表达式）
          TARGET=$(grep -E '^\[target\.' .cargo/config.toml | head -n 1 | sed 's/^\[target\.//;s/\]//')
          # 确保看起来像 Rustup target（不含 cfg(...)）
          if echo "$TARGET" | grep -qE 'cfg\('; then
            echo "::error::.cargo/config.toml 里包含 cfg(...) 形式的 target，请改用真正的 Rustup 目标（如 xtensa-esp32s3-espidf）"
            exit 1
          fi
          # 统一用 - 避免下划线干扰
          TARGET=$(echo "$TARGET" | tr '_' '-')
          echo "TARGET=$TARGET" >> "$GITHUB_OUTPUT"

          # 2) 提取 chip：优先从 [package.metadata.esp-idf-sys].mcu 取
          CHIP=$(grep -oP '^\s*mcu\s*=\s*"\K[^"]+' Cargo.toml | head -n 1)
          # 若没有，就尝试从 target 名里猜（简单但不完美）
          if [ -z "$CHIP" ]; then
            CHIP=$(echo "$TARGET" | grep -oP '(esp32|esp32s[23]|esp32c[236]|esp32h2|esp32p4)' | head -n 1)
          fi
          # 确保 chip 里没有下划线
          CHIP=$(echo "$CHIP" | tr '_' '-')
          echo "CHIP=$CHIP" >> "$GITHUB_OUTPUT"

          # 3) 二进制文件名（Cargo 会把 name 里的 - 换成 _）
          CRATE_NAME=$(grep -oP '^\s*name\s*=\s*"\K[^"]+' Cargo.toml | head -n 1 | tr '-' '_')
          echo "CRATE_NAME=$CRATE_NAME" >> "$GITHUB_OUTPUT"

          echo "Detected: TARGET=$TARGET, CHIP=$CHIP, CRATE_NAME=$CRATE_NAME"

      - name: Install Rust toolchain (RISC-V)
        if: >-
          steps.cfg.outputs.TARGET == 'riscv32imc-esp-espidf' ||
          steps.cfg.outputs.TARGET == 'riscv32imac-esp-espidf' ||
          steps.cfg.outputs.TARGET == 'riscv32imafc-esp-espidf'
        uses: dtolnay/rust-toolchain@nightly
        with:
          targets: ${{ steps.cfg.outputs.TARGET }}
          components: rust-src

      - name: Install Rust toolchain (Xtensa)
        if: >-
          startsWith(steps.cfg.outputs.TARGET, 'xtensa-')
        uses: esp-rs/xtensa-toolchain@v1.6
        with:
          default: true
          buildtargets: "${{ steps.cfg.outputs.TARGET }}"
          ldproxy: false

      - name: Cache Cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ steps.cfg.outputs.TARGET }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-${{ steps.cfg.outputs.TARGET }}-

      - name: Install cargo-binstall (for faster espflash install)
        run: |
          # cargo-binstall 优先用 GitHub Releases 预编译包
          curl -L --proto '=https' --tlsv1.2 -sSf https://raw.githubusercontent.com/cargo-bins/cargo-binstall/main/install-from-binstall-release.sh | bash

      - name: Install espflash (via cargo binstall, fallback to cargo install)
        run: |
          set -e
          # 如果 ~/.cargo/bin/espflash 已经存在，跳过安装
          if command -v espflash >/dev/null 2>&1; then
            espflash --version
            exit 0
          fi

          # 优先用 binstall（速度快）
          if command -v cargo-binstall >/dev/null 2>&1; then
            cargo binstall -y espflash || true
          fi

          # 如果 binstall 没成功，再用 cargo install
          if ! command -v espflash >/dev/null 2>&1; then
            cargo install espflash --locked
          fi

          espflash --version

      - name: Build project
        run: cargo build --release

      - name: Merge into single binary (bootloader + part-table + app)
        run: |
          ELF="target/${{ steps.cfg.outputs.TARGET }}/release/${{ steps.cfg.outputs.CRATE_NAME }}"
          OUT="merged-${{ steps.cfg.outputs.CHIP }}.bin"
          espflash save-image \
            --chip "${{ steps.cfg.outputs.CHIP }}" \
            --merge \
            "$ELF" \
            "$OUT"
          echo "Merged binary: $OUT"
          ls -lh "$OUT"

      - name: Upload to 0x0.st
        env:
          ZERO_ST_URL: "https://0x0.st"
        run: |
          OUT="merged-${{ steps.cfg.outputs.CHIP }}.bin"
          RESP=$(curl -sS -F "file=@${OUT}" "$ZERO_ST_URL")
          URL=$(echo "$RESP" | grep -oE 'https://0x0\.st/[a-zA-Z0-9]+' | head -n 1)
          if [ -z "$URL" ]; then
            echo "::error::Upload to 0x0.st failed: $RESP"
            exit 1
          fi
          echo "Download link: $URL"

      - name: Upload artifact to GitHub (backup)
        uses: actions/upload-artifact@v4
        with:
          name: esp32-${{ steps.cfg.outputs.CHIP }}-merged-bin
          path: "merged-${{ steps.cfg.outputs.CHIP }}.bin"
          retention-days: 7
