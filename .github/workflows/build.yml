name: ESP32 Build & Upload to 0x0

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]
  workflow_dispatch: # 允许在 GitHub Actions 页面手动点击运行

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract build config (Target, Chip, Crate Name)
        id: cfg
        run: |
          # 1) 精准提取 target：从 [build] 段下找 target = "..."
          TARGET=$(awk -F'"' '/^\[build\]/{f=1} f && /^target/{print $2; exit}' .cargo/config.toml)
          echo "TARGET=$TARGET" >> "$GITHUB_OUTPUT"

          # 2) 精准提取 chip：从 [env] 段下找 MCU = "..."
          CHIP=$(awk -F'"' '/^\[env\]/{f=1} f && /^MCU/{print $2; exit}' .cargo/config.toml)
          # 兜底：如果没找到 MCU，再从 target 字符串里猜
          if [ -z "$CHIP" ]; then
            CHIP=$(echo "$TARGET" | grep -oP '(esp32|esp32s[23]|esp32c[236]|esp32h2|esp32p4)' | head -n 1)
          fi
          # 确保芯片名没有下划线 (防止某些配置写成 esp32_c6)
          CHIP=$(echo "$CHIP" | tr '_' '-')
          echo "CHIP=$CHIP" >> "$GITHUB_OUTPUT"

          # 3) 提取二进制文件名（Cargo 编译时会把 name 里的 - 换成 _）
          CRATE_NAME=$(grep -oP '^\s*name\s*=\s*"\K[^"]+' Cargo.toml | head -n 1 | tr '-' '_')
          echo "CRATE_NAME=$CRATE_NAME" >> "$GITHUB_OUTPUT"

          echo "🎯 Detected -> Target: $TARGET | Chip: $CHIP | Binary: $CRATE_NAME"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@nightly
        with:
          targets: ${{ steps.cfg.outputs.TARGET }}
          components: rust-src

      # 缓存对“保证免费”至关重要：ESP-IDF 的 C 工具链高达数百MB，不缓存会每次消耗大量时间下载
      - name: Cache Cargo registry, build & ESP-IDF tools
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
            .embuild # 对应你 config 里的 ESP_IDF_TOOLS_INSTALL_DIR = "workspace"
          key: ${{ runner.os }}-esp-idf-${{ steps.cfg.outputs.TARGET }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-esp-idf-${{ steps.cfg.outputs.TARGET }}-

      - name: Install cargo-binstall & tools (espflash, ldproxy)
        run: |
          # 安装 binstall (利用预编译包极速安装后续工具)
          curl -L --proto '=https' --tlsv1.2 -sSf https://raw.githubusercontent.com/cargo-bins/cargo-binstall/main/install-from-binstall-release.sh | bash
          
          # 安装 espflash (优先走预编译包提速，万一失败则自动回退源码编译)
          cargo binstall -y espflash || cargo install espflash
          
          # 安装 ldproxy (对应你 config 里的 linker = "ldproxy"，构建标准库必须)
          cargo binstall -y ldproxy || cargo install ldproxy

      - name: Build project
        run: |
          # 不需要手动指定 --target，因为 .cargo/config.toml 的 [build] 段已经全局指定了
          cargo build --release

      - name: Merge into single binary (Bootloader + Partitions + App)
        run: |
          ELF="target/${{ steps.cfg.outputs.TARGET }}/release/${{ steps.cfg.outputs.CRATE_NAME }}"
          OUT="merged-${{ steps.cfg.outputs.CHIP }}.bin"
          
          # espflash 可以直接读取 ESP-IDF 生成的 ELF 并融合为可直接刷写的单 bin
          espflash save-image \
            --chip "${{ steps.cfg.outputs.CHIP }}" \
            --merge \
            "$ELF" \
            "$OUT"
          
          echo "✅ Merged binary created:"
          ls -lh "$OUT"

      - name: Upload to 0x0.st
        env:
          ZERO_ST_URL: "https://0x0.st"
        run: |
          OUT="merged-${{ steps.cfg.outputs.CHIP }}.bin"
          RESP=$(curl -sS -F "file=@${OUT}" "$ZERO_ST_URL")
          URL=$(echo "$RESP" | grep -oE 'https://0x0\.st/[a-zA-Z0-9]+' | head -n 1)
          
          if [ -z "$URL" ]; then
            echo "::error::Upload to 0x0.st failed. Response: $RESP"
            exit 1
          fi
          
          echo ""
          echo "==========================================="
          echo "🎉 直接下载刷机链接 (有效期1天): $URL"
          echo "==========================================="
          echo ""

      - name: Upload artifact to GitHub (Backup)
        uses: actions/upload-artifact@v4
        with:
          name: esp32-${{ steps.cfg.outputs.CHIP }}-merged-bin
          path: "merged-${{ steps.cfg.outputs.CHIP }}.bin"
          retention-days: 7 # 免费仓库限制最多 90 天，设 7 天足够且干净
