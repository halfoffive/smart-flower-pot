<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#059669" />
  <title>智能花盆</title>
  <!-- 使用相对路径，兼容域名根目录（Cloudflare）和子目录（GitHub Pages）部署 -->
  <link rel="icon" href="potted_plant_3d.png" type="image/png" />
  <link rel="manifest" href="manifest.json" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet" />
  <!-- 启动页内联样式（零依赖，毫秒级渲染） -->
  <style>
    /* 启动页全屏容器 */
    #splash {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgb(var(--sfp-bg-page, 243 244 246));
      transition: opacity 0.35s ease, transform 0.35s ease;
      pointer-events: none;
    }
    /* 启动页退出动画 */
    #splash.splash-exit {
      opacity: 0;
      transform: scale(1.05);
    }
    /* 旋转圆环 */
    .splash-spinner {
      width: 36px;
      height: 36px;
      border: 3px solid rgb(16 185 129 / 0.25);
      border-top-color: rgb(16 185 129);
      border-radius: 50%;
      animation: splash-spin 0.7s linear infinite;
    }
    @keyframes splash-spin {
      to { transform: rotate(360deg); }
    }
    .splash-title {
      margin-top: 16px;
      font-size: 20px;
      font-weight: 700;
      color: rgb(16 185 129);
      letter-spacing: 0.05em;
    }
    .splash-sub {
      margin-top: 8px;
      font-size: 13px;
      color: rgb(107 114 128);
    }
  </style>
  <script>
    (function() {
      var m = localStorage.getItem('sfp-theme');
      if (m === 'light' || m === 'dark') {
        document.documentElement.setAttribute('data-theme', m);
      } else {
        var d = window.matchMedia('(prefers-color-scheme: dark)').matches;
        document.documentElement.setAttribute('data-theme', d ? 'dark' : 'light');
      }
    })();
  </script>
</head>
<body>
  <!-- 启动页：Vue 加载前显示，挂载后淡出移除 -->
  <div id="splash">
    <div class="splash-spinner"></div>
    <div class="splash-title">智能花盆</div>
    <div class="splash-sub">加载中…</div>
  </div>
  <div id="app"></div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
