name: ESP32 Build & Upload to 0x0

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git wget flex bison gperf \
            python3 python3-pip python3-venv \
            cmake ninja-build ccache \
            libffi-dev libssl-dev \
            dfu-util libusb-1.0-0 \
            libudev-dev

      - name: Extract build config
        id: cfg
        run: |
          # 提取时统一用 tr -d '\r' 过滤掉可能存在的 Windows 换行符 (CRLF)
          TARGET=$(awk -F'"' '/^\[build\]/{f=1} f && /^target/{print $2; exit}' .cargo/config.toml | tr -d '\r')
          if [ -z "$TARGET" ]; then
            echo "::error::未在 .cargo/config.toml 找到 [build] 下的 target"
            exit 1
          fi
          echo "TARGET=$TARGET" >> "$GITHUB_OUTPUT"

          CHIP=$(awk -F'"' '/^\[env\]/{f=1} f && /^MCU/{print $2; exit}' .cargo/config.toml | tr -d '\r')
          if [ -z "$CHIP" ]; then
            CHIP=$(echo "$TARGET" | grep -oP '(esp32|esp32s[23]|esp32c[236]|esp32h2|esp32p4)' | head -n 1)
          fi
          CHIP=$(echo "$CHIP" | tr '_' '-' | tr -d '\r')
          echo "CHIP=$CHIP" >> "$GITHUB_OUTPUT"

          CRATE_NAME=$(grep -oP '^\s*name\s*=\s*"\K[^"]+' Cargo.toml | head -n 1 | tr '-' '_' | tr -d '\r')
          echo "CRATE_NAME=$CRATE_NAME" >> "$GITHUB_OUTPUT"

          echo "🎯 Target: $TARGET | Chip: $CHIP | Binary: $CRATE_NAME"

      - name: Install Rust (nightly + rust-src)
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rust-src

      - name: Cache Cargo, build & ESP-IDF tools
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
            .embuild
          key: ${{ runner.os }}-esp-${{ steps.cfg.outputs.TARGET }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-esp-${{ steps.cfg.outputs.TARGET }}-

      - name: Install cargo-binstall
        run: |
          curl -L --proto '=https' --tlsv1.2 -sSf \
            https://raw.githubusercontent.com/cargo-bins/cargo-binstall/main/install-from-binstall-release.sh | bash

      - name: Install espflash
        run: |
          cargo binstall -y espflash || cargo install espflash
          espflash --version

      - name: Install ldproxy
        run: |
          cargo binstall -y ldproxy || cargo install ldproxy
          which ldproxy

      - name: Build
        run: cargo build --release

      - name: Merge into single flashable binary
        run: |
          ELF="target/${{ steps.cfg.outputs.TARGET }}/release/${{ steps.cfg.outputs.CRATE_NAME }}"
          OUT="merged-${{ steps.cfg.outputs.CHIP }}.bin"
          espflash save-image \
            --chip "${{ steps.cfg.outputs.CHIP }}" \
            --merge \
            "$ELF" \
            "$OUT"
          echo "✅ Created:"
          ls -lh "$OUT"

      - name: Upload to 0x0.st
        run: |
          OUT="merged-${{ steps.cfg.outputs.CHIP }}.bin"
          RESP=$(curl -sS -F "file=@${OUT}" https://0x0.st)
          URL=$(echo "$RESP" | grep -oE 'https://0x0\.st/[a-zA-Z0-9]+' | head -n 1)
          if [ -z "$URL" ]; then
            echo "::error::0x0.st upload failed. Response: $RESP"
            exit 1
          fi
          echo ""
          echo "==========================================="
          echo "🎉 Download: $URL"
          echo "==========================================="
          echo ""

      - name: Upload artifact (backup)
        uses: actions/upload-artifact@v4
        with:
          name: esp32-${{ steps.cfg.outputs.CHIP }}-merged-bin
          path: "merged-${{ steps.cfg.outputs.CHIP }}.bin"
          retention-days: 7
