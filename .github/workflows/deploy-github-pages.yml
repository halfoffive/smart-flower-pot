# ============================================================
# GitHub Pages 部署
#
# 触发条件：推送 master 分支或手动触发 workflow_dispatch
#
# 构建策略：
# - 使用 Vite --base CLI 参数注入仓库名作为 base URL
#   （https://<user>.github.io/<repo>/ 格式）
# - 不修改 web/ 下任何配置文件，不影响已有的 Cloudflare Pages 部署
# - 产出物为 web/dist/，由 actions/upload-pages-artifact 上传
# ============================================================

name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

# 防止并发部署冲突
concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: 安装依赖
        run: npm --prefix web ci

      - name: 构建（注入仓库名作为 base URL）
        run: npm --prefix web run build -- --base=/${{ github.event.repository.name }}/

      - name: 上传 Pages 产物
        uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest

    # GitHub Pages 部署权限
    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: 部署到 GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
